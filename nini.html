<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오늘도 함께 발전하자 🌸</title>
    <style>
        :root {
            --bg-color: #fdfcf5; --primary-pink: #ffb7c5; --deep-pink: #e08e9b;
            --accent-pink: #ffebee; --stamp-color: #ff6b81; --text-color: #5d4037;
            --tomorrow-bg: #f5fff5; --tomorrow-border: #e2f3e2; 
            --wish-yellow: #fff9e6; --wish-gold: #ffd700;
            --shadow: 0 10px 25px rgba(224, 142, 155, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        h2 { color: var(--deep-pink); font-weight: 600; margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; color: #a08080; margin-bottom: 20px; }
        .container {
            width: 100%; max-width: 420px; background: white;
            padding: 25px; border-radius: 30px;
            box-shadow: var(--shadow); border: 2px solid var(--accent-pink);
            margin-bottom: 20px;
        }
        
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--accent-pink); border-radius: 12px; font-size: 1rem; }
        .wish-input { background-color: var(--wish-yellow) !important; border: 2px dashed #ffe082 !important; color: #b8860b !important; }

        .wish-box {
            background-color: var(--wish-yellow);
            border: 1px dashed #ffe082;
            color: #b8860b;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            font-weight: normal; 
        }

        .main-btn { width: 100%; background: var(--primary-pink); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .edit-btn { background: none; border: 1px solid var(--primary-pink); color: var(--primary-pink); padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; align-self: center; }
        
        .goal-card { position: relative; border: 2px solid var(--accent-pink); border-radius: 20px; padding: 15px; background: #fffafb; margin-bottom: 20px; display: flex; flex-direction: column; }
        .goal-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--accent-pink); }
        
        input[type="checkbox"] { appearance: none; width: 22px; height: 22px; border: 2px solid var(--primary-pink); border-radius: 6px; position: relative; cursor: pointer; flex-shrink: 0; }
        input[type="checkbox"]:checked { background-color: var(--primary-pink); }
        input[type="checkbox"]:checked::after { content: '❤'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .stamp {
            position: absolute; right: 5px; top: 5px; width: 70px; height: 70px;
            border: 3px double var(--stamp-color); color: var(--stamp-color); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.8); transform: rotate(15deg); font-weight: bold; font-size: 0.8rem;
            z-index: 10;
        }
        
        .section-title { font-size: 1.1rem; color: var(--deep-pink); margin: 25px 0 10px 0; display: flex; align-items: center; gap: 8px; font-weight: bold; width: 100%; max-width: 420px; }
        .tomorrow-board { width: 100%; border-radius: 15px; padding: 15px; border: 2px solid var(--tomorrow-border); background: var(--tomorrow-bg); }
        
        .message-list { max-height: 200px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; padding: 5px; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .msg-left { align-self: flex-start; background: white; border: 1px solid var(--accent-pink); }
        .msg-right { align-self: flex-end; background: var(--primary-pink); color: white; }

        .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; text-align: center; font-size: 0.8rem; margin-top: 10px; }
        .cal-day { padding: 8px 0; border-radius: 8px; background: #f9f9f9; position: relative; min-height: 45px; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; transition: background 0.2s; overflow: hidden; }
        .cal-day:hover { background: #f0f0f0; }
        .cal-day.active { background: var(--accent-pink); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-btn { background: none; border: 1px solid var(--primary-pink); color: var(--primary-pink); border-radius: 50%; width: 25px; height: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .history-day-group { margin-bottom: 15px; border-radius: 15px; overflow: hidden; border: 1px solid var(--accent-pink); }
        .history-bg-white { background: white; }
        .history-bg-pink { background: var(--accent-pink); }
        .history-item { display: flex; align-items: center; gap: 12px; padding: 15px; position: relative; font-size: 0.85rem; }
        .history-stamp { color: var(--stamp-color); font-size: 2.2rem; flex-shrink: 0; transform: rotate(-10deg); width: 40px; text-align: center; }
        .history-content { flex: 1; line-height: 1.5; }
        .del-btn { position: absolute; right: 10px; top: 10px; background: none; border: none; color: #bbb; cursor: pointer; font-size: 1rem; }

        #summary-overlay, #celebration-overlay, #video-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px;
        }

        #video-modal-overlay { background: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body>

<div id="celebration-overlay">
    <div style="font-size: 80px;">💮</div>
    <h1 style="color: var(--stamp-color);">세상에서 제일 멋진 우리 자기!</h1>
    <p style="font-size: 1.2rem;">해냈구나!<br>아주 큰 뽀뽀를 보낼게 쪼옥 ❤</p>
    <button class="main-btn" style="width:150px; margin-top:20px;" onclick="closeCelebration()">보상 받기!</button>
</div>

<div id="summary-overlay">
    <div style="font-size: 60px;">🏆</div>
    <h2 id="summary-title" style="color: var(--stamp-color);">지난달 PK 결과</h2>
    <div id="summary-content" class="container" style="box-shadow:none; border-style:dashed; margin:20px 0;"></div>
    <button class="main-btn" style="width:180px;" onclick="closeSummary()">확인 완료! 새로운 달도 화이팅! ✨</button>
</div>

<div id="video-modal-overlay">
    <div class="container" style="position:relative; max-width:380px; padding:30px 20px; max-height:80vh; display:flex; flex-direction:column;">
        <button onclick="closeVideoModal()" style="position:absolute; top:15px; right:20px; background:none; border:none; font-size:1.8rem; color:#aaa; cursor:pointer;">&times;</button>
        <h3 id="video-modal-title" style="color:var(--deep-pink); margin-top:0;">🎥 영상 목록</h3>
        <div id="video-modal-list" style="overflow-y:auto; padding:5px; text-align:left; flex-grow:1;"></div>
        <button id="add-video-btn" class="main-btn" style="margin-top:15px; background:var(--deep-pink);" onclick="addNewVideo()">＋ 새 영상 추가</button>
    </div>
</div>

<script>
    const passwords = { "0000": "Nini'bf", "1111": "Nini" };
    window.loginRole = null;
    while (!window.loginRole) {
        let pwd = prompt("당신만의 비밀 코드를 입력하세요 🤫");
        if (passwords[pwd]) {
            window.loginRole = passwords[pwd];
            alert(`환영합니다, ${window.loginRole}님! 🌸`);
        } else {
            alert("다시 한 번 잘 생각해 보세요!");
        }
    }
</script>

<h2>오늘도 함께 발전하자 🌸</h2>
<div class="subtitle">Nini'bf 🐼 & Nini 🐱 의 비밀 기지</div>

<div class="container">
    <div id="my-section"></div>
    <hr style="border: 0; border-top: 1px solid var(--accent-pink); margin: 25px 0;">
    <div id="partner-section"></div>
</div>

<div class="section-title" style="justify-content: center;">🧞 요술 램프 문지르기</div>
<div class="container" style="padding:15px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="wish-area"></div>
</div>

<div class="section-title" style="justify-content: center;">🎥 나를 봐줘</div>
<div class="container" style="padding:15px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="video-calendar-area"></div>
</div>

<div class="section-title" style="justify-content: center;">💬 따뜻한 한마디</div>
<div class="container" style="padding:15px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="message-list" class="message-list"></div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="msg-input" placeholder="무슨 말이라도 해보세요...">
        <button class="role-btn" style="width:50px; flex:none; border-radius:15px; background:var(--primary-pink); color:white; border:none;" onclick="sendMessage()">❤</button>
    </div>
</div>

<div class="section-title" style="justify-content: center;">📅 내일의 발전 예약하기</div>
<div class="container" style="padding:25px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="tomorrow-area"></div>
</div>

<div class="section-title" style="justify-content: center;">🏆 내가 최고야</div>
<div class="container" style="padding:20px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="stats-area"></div>
</div>

<div class="history-section" style="width: 100%; max-width: 420px;">
    <div class="section-title" style="justify-content: center;">📜 성장 발자취</div>
    <div id="history-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove, serverTimestamp, update, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDY78fLhiuEs3t4F1Ps9dKBCzd61axnCDA",
        authDomain: "nini-20260518.firebaseapp.com",
        projectId: "nini-20260518",
        storageBucket: "nini-20260518.firebasestorage.app",
        messagingSenderId: "588891461039",
        appId: "1:588891461039:web:3b13cff1ef704883aa4b5a",
        databaseURL: "https://nini-20260518-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'coupleDataKR');

    let currentUser = window.loginRole; 
    let globalData = { active: {}, tomorrow: {}, messages: {}, history: {}, videos: {}, settings: {}, wishes: {} };
    const userMap = { "Nini'bf": { partner: 'Nini', icon: '🐼' }, 'Nini': { partner: "Nini'bf", icon: '🐱' } };
    
    let isEditingToday = false, isEditingTomorrow = false;
    window.showAllHistory = false;
    
    window.currentVideoDate = null;
    window.currentVideoFilter = null;

    let statsViewDate = new Date(); 
    let videoViewDate = new Date(); 
    statsViewDate.setHours(0,0,0,0);
    videoViewDate.setHours(0,0,0,0);

    function getLogicDate() {
        const now = new Date();
        now.setHours(now.getHours() - 4); 
        const y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2, '0'), d = String(now.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function getDisplayDate(logicDate) {
        const [y, m, d] = logicDate.split('-');
        return `${parseInt(m)}월 ${parseInt(d)}일`;
    }

    onValue(dbRef, (snapshot) => {
        const d = snapshot.val() || {};
        const logicToday = getLogicDate();
        
        if (d.active?.[currentUser]?.status === 'completed') {
            document.getElementById('celebration-overlay').style.display = 'flex';
        }

        let rawActive = d.active || {}, rawTomorrow = d.tomorrow || {}, rawMessages = d.messages || {}, needsUpdate = false, updateData = {};

        ["Nini'bf", 'Nini'].forEach(u => {
            if ((rawActive[u] && rawActive[u].logicDate !== logicToday) || (rawTomorrow[u] && rawTomorrow[u].createDate && rawTomorrow[u].createDate !== logicToday)) {
                if (rawActive[u] && rawActive[u].status !== 'completed') {
                    const newKey = push(child(ref(db), 'coupleDataKR/history')).key;
                    updateData[`history/${newKey}`] = { ...rawActive[u], timestamp: serverTimestamp() };
                }
                if (rawTomorrow[u]) {
                    updateData[`active/${u}`] = { ...rawTomorrow[u], logicDate: logicToday, date: getDisplayDate(logicToday), status: 'pending' };
                    delete updateData[`active/${u}`].createDate;
                    updateData[`tomorrow/${u}`] = null;
                } else { updateData[`active/${u}`] = null; }
                needsUpdate = true;
            }
        });

        Object.keys(rawMessages).forEach(k => { if (rawMessages[k].logicDate !== logicToday) { updateData[`messages/${k}`] = null; needsUpdate = true; } });

        if (needsUpdate) { update(dbRef, updateData); return; }

        globalData = { 
            active: rawActive, tomorrow: rawTomorrow, messages: rawMessages, 
            history: d.history || {}, videos: d.videos || {}, settings: d.settings || {}, wishes: d.wishes || {} 
        };
        
        checkSummary(); 
        render();

        if (document.getElementById('video-modal-overlay').style.display === 'flex') {
            window.renderVideoModal();
        }
    });

    function checkSummary() {
        const logicToday = getLogicDate();
        const currentMonthStr = logicToday.substring(0, 7); 
        const mySettings = globalData.settings[currentUser] || {};
        const lastSeen = mySettings.lastSummarySeen;
        
        if (lastSeen !== currentMonthStr) {
            let [y, m] = currentMonthStr.split('-').map(Number);
            m -= 1;
            if (m === 0) { m = 12; y -= 1; }
            const targetStr = `${y}-${String(m).padStart(2, '0')}`; 

            let myS = 0, pS = 0, partner = userMap[currentUser].partner;
            Object.values(globalData.history).forEach(h => {
                if (h.status === 'completed' && h.logicDate?.startsWith(targetStr)) {
                    if (h.owner === currentUser) myS++; else pS++;
                }
            });

            if (myS + pS > 0) {
                document.getElementById('summary-content').innerHTML = `
                    <h3 style="margin-top:0;">${m}월 전적 결산</h3>
                    <div style="font-size:1.1rem; line-height:2;">
                        내 도장：<span style="color:var(--stamp-color); font-weight:bold;">${myS}</span> 개<br>
                        ${partner}의 도장：<span style="color:var(--deep-pink); font-weight:bold;">${pS}</span> 개<br>
                        <hr style="border:0; border-top:1px dashed #eee;">
                        ${myS > pS ? '🥇 이번 라운드는 내가 이겼어! 헤헤~' : (myS < pS ? `🥇 ${partner} 자기가 이겼네! 다음 달엔 내가 따라잡을 거야!` : '🤝 무승부! 우리 둘 다 최고야!')}
                    </div>`;
                document.getElementById('summary-overlay').style.display = 'flex';
            }
        }
    }

    window.closeSummary = () => {
        const currentMonthStr = getLogicDate().substring(0, 7);
        set(ref(db, `coupleDataKR/settings/${currentUser}/lastSummarySeen`), currentMonthStr);
        document.getElementById('summary-overlay').style.display = 'none';
    };

    window.closeCelebration = () => {
        document.getElementById('celebration-overlay').style.display = 'none';
        set(ref(db, `coupleDataKR/active/${currentUser}`), null);
    };

    window.openVideoModal = (dateStr, filterOwner = null) => {
        window.currentVideoDate = dateStr;
        window.currentVideoFilter = filterOwner;
        window.renderVideoModal();
        document.getElementById('video-modal-overlay').style.display = 'flex';
    };

    window.closeVideoModal = () => {
        document.getElementById('video-modal-overlay').style.display = 'none';
    };

    window.renderVideoModal = () => {
        const dateStr = window.currentVideoDate;
        const filter = window.currentVideoFilter;
        const addBtn = document.getElementById('add-video-btn');
        const partner = userMap[currentUser].partner; 
        
        if (filter === partner) {
            addBtn.style.display = 'none'; 
        } else {
            addBtn.style.display = 'block'; 
        }
        
        let titleText = `🎥 ${dateStr}`;
        if (filter === "Nini'bf") titleText += '<br><small style="font-size:0.9rem; color:#888;">🐼 Nini\'bf의 전용 채널</small>';
        if (filter === 'Nini') titleText += '<br><small style="font-size:0.9rem; color:#888;">🐱 Nini의 전용 채널</small>';
        document.getElementById('video-modal-title').innerHTML = titleText;
        
        const vData = globalData.videos[dateStr] || {};
        let listHtml = '';

        if (typeof vData.panda === 'string') {
            if (!filter || filter === "Nini'bf") listHtml += createVideoItemHtml('panda', "Nini'bf", '오늘 공유한 영상', vData.panda);
        }
        if (typeof vData.cat === 'string') {
            if (!filter || filter === 'Nini') listHtml += createVideoItemHtml('cat', 'Nini', '오늘 공유한 영상', vData.cat);
        }

        Object.entries(vData).forEach(([k, v]) => {
            if (k !== 'panda' && k !== 'cat' && typeof v === 'object') {
                if (!filter || filter === v.owner) {
                    listHtml += createVideoItemHtml(k, v.owner, v.title, v.url);
                }
            }
        });

        if (listHtml === '') listHtml = '<p style="text-align:center; color:#ccc; margin-top:20px;">아직 영상이 없어요 🌱</p>';
        document.getElementById('video-modal-list').innerHTML = listHtml;
    };

    function createVideoItemHtml(key, owner, title, url) {
        const icon = owner === "Nini'bf" ? '🐼' : '🐱';
        const canEdit = owner === currentUser;
        return `
        <div style="display:flex; justify-content:space-between; align-items:center; background:#f5fff5; padding:12px 15px; border-radius:12px; margin-bottom:10px; border:1px solid #e2f3e2;">
            <div style="cursor:pointer; flex:1; overflow:hidden;" onclick="window.open('${url}', '_blank')">
                <span style="margin-right:8px; font-size:1.2rem;">${icon}</span>
                <span style="color:var(--text-color); font-weight:bold; white-space:nowrap; text-overflow:ellipsis; overflow:hidden; display:inline-block; max-width:200px; vertical-align:middle;">${title}</span>
            </div>
            ${canEdit ? `<button onclick="editVideo('${key}')" style="background:var(--accent-pink); border:1px solid var(--primary-pink); color:var(--deep-pink); border-radius:8px; font-size:0.8rem; cursor:pointer; padding:4px 10px; margin-left:10px; font-weight:bold; flex-shrink:0;">수정</button>` : ''}
        </div>`;
    }

    window.addNewVideo = () => {
        const title = prompt("이 영상의 귀여운 이름을 지어주세요:\n(예: 같이 밥 먹기 😋)");
        if (!title || !title.trim()) return;
        const url = prompt("영상 링크를 붙여넣으세요:");
        if (!url || !url.trim()) return;

        push(ref(db, `coupleDataKR/videos/${window.currentVideoDate}`), {
            owner: currentUser,
            title: title.trim(),
            url: url.trim(),
            timestamp: serverTimestamp()
        });
    };

    window.editVideo = (key) => {
        const vData = globalData.videos[window.currentVideoDate][key];
        let oldTitle = "오늘 공유한 영상";
        let oldUrl = "";
        
        if (typeof vData === 'string') {
            oldUrl = vData;
        } else {
            oldTitle = vData.title;
            oldUrl = vData.url;
        }

        const newTitle = prompt("✏️ 영상 이름 수정:\n(이 영상을 삭제하려면 이름을 '비우고' 확인을 누르세요)", oldTitle);
        if (newTitle === null) return; 

        if (newTitle.trim() === "") {
            if (confirm("정말 이 영상을 삭제하시겠습니까? 🗑️")) {
                remove(ref(db, `coupleDataKR/videos/${window.currentVideoDate}/${key}`));
            }
            return;
        }

        const newUrl = prompt("🔗 영상 링크 수정:", oldUrl);
        if (newUrl === null || newUrl.trim() === "") return;

        if (typeof vData === 'string') {
            remove(ref(db, `coupleDataKR/videos/${window.currentVideoDate}/${key}`));
            push(ref(db, `coupleDataKR/videos/${window.currentVideoDate}`), {
                owner: currentUser,
                title: newTitle.trim(),
                url: newUrl.trim(),
                timestamp: serverTimestamp()
            });
        } else {
            update(ref(db, `coupleDataKR/videos/${window.currentVideoDate}/${key}`), {
                title: newTitle.trim(),
                url: newUrl.trim()
            });
        }
    };

    window.retroStamp = (key) => {
        const partner = userMap[currentUser].partner;
        if(confirm(`${partner}에게 도장을 찍어줄까요? ✨\n(시스템이 자동으로 완료되지 않은 목표를 체크합니다!)`)) {
            const hData = globalData.history[key];
            if(hData) {
                hData.status = 'completed';
                if(hData.items) hData.items.forEach(i => i.d = true);
                
                if (hData.wish && hData.wish.trim() !== "") {
                    push(ref(db, 'coupleDataKR/wishes'), { owner: hData.owner, text: hData.wish });
                    delete hData.wish; 
                }
                
                set(ref(db, `coupleDataKR/history/${key}`), hData);
            }
        }
    };

    window.fulfillWish = (wishKey) => {
        if(confirm("최고예요! 정말로 자기의 소원을 이루어 주었나요? ✨🧞‍♂️")) {
            remove(ref(db, `coupleDataKR/wishes/${wishKey}`));
        }
    };

    window.changeMonth = (type, offset) => {
        if (type === 'stats') { statsViewDate.setMonth(statsViewDate.getMonth() + offset); }
        else { videoViewDate.setMonth(videoViewDate.getMonth() + offset); }
        render();
    };

    window.submitGoals = () => {
        const goals = [document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value].filter(g => g?.trim());
        const wish = document.getElementById('g-wish').value;
        if(goals.length === 0) return alert("목표를 적어주세요!");
        isEditingToday = false;
        set(ref(db, `coupleDataKR/active/${currentUser}`), {
            owner: currentUser, logicDate: getLogicDate(), date: getDisplayDate(getLogicDate()),
            status: 'pending', items: goals.map(g => ({t: g, d: false})), wish: wish
        });
    };

    window.saveTomorrowPlan = () => {
        const goals = [document.getElementById('t1').value, document.getElementById('t2').value, document.getElementById('t3').value].filter(g => g?.trim());
        const wish = document.getElementById('t-wish').value;
        if(goals.length === 0) return alert("내일도 계획이 있어야 해요!");
        isEditingTomorrow = false;
        set(ref(db, `coupleDataKR/tomorrow/${currentUser}`), {
            owner: currentUser, items: goals.map(g => ({t: g, d: false})), wish: wish, createDate: getLogicDate()
        });
    };

    window.modifyTodayGoal = () => { isEditingToday = true; render(); };
    window.cancelEditToday = () => { isEditingToday = false; render(); };
    window.editTomorrow = () => { isEditingTomorrow = true; render(); };
    window.cancelEditTomorrow = () => { isEditingTomorrow = false; render(); };
    window.toggleHistory = () => { window.showAllHistory = !window.showAllHistory; render(); };
    window.toggleCheck = (i) => { globalData.active[currentUser].items[i].d = !globalData.active[currentUser].items[i].d; set(ref(db, `coupleDataKR/active/${currentUser}`), globalData.active[currentUser]); };
    
    window.requestReview = () => {
        if (!globalData.active[currentUser].items.every(i => i.d)) return alert("전부 체크해야 도장을 받을 수 있어요!");
        globalData.active[currentUser].status = 'reviewing';
        set(ref(db, `coupleDataKR/active/${currentUser}`), globalData.active[currentUser]);
    };
    
    window.approvePartner = () => {
        const p = userMap[currentUser].partner, pd = globalData.active[p];
        if(!pd) return;
        pd.status = 'completed';

        if (pd.wish && pd.wish.trim() !== "") {
            push(ref(db, 'coupleDataKR/wishes'), { owner: p, text: pd.wish, timestamp: serverTimestamp() });
        }

        const finished = { ...pd, timestamp: serverTimestamp() };
        delete finished.wish; 
        push(ref(db, 'coupleDataKR/history'), finished);
        set(ref(db, `coupleDataKR/active/${p}`), pd);
    };

    window.sendMessage = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, 'coupleDataKR/messages'), {
            sender: currentUser, text: input.value, time: new Date().getHours() + ":" + new Date().getMinutes().toString().padStart(2, '0'), 
            logicDate: getLogicDate(), timestamp: serverTimestamp()
        });
        input.value = '';
    };
    window.deleteHistory = (key) => { if(confirm("삭제하시겠습니까?")) remove(ref(db, `coupleDataKR/history/${key}`)); };

    function render() {
        const partner = userMap[currentUser].partner;
        const myActive = globalData.active[currentUser], pActive = globalData.active[partner], tmPlan = globalData.tomorrow[currentUser];
        const currentMonthStr = getLogicDate().substring(0, 7); 

        const myS = document.getElementById('my-section');
        if (!myActive || isEditingToday) {
            myS.innerHTML = `<h3>✍ ${isEditingToday ? '오늘 목표 수정' : '오늘 목표 설정'}</h3><input type="text" id="g1" placeholder="목표 1"><input type="text" id="g2" placeholder="목표 2"><input type="text" id="g3" placeholder="목표 3"><input type="text" id="g-wish" class="wish-input" placeholder="🎁 완료 후, 내 소원은..."><button class="main-btn" onclick="submitGoals()">저장 ✨</button>${isEditingToday ? `<button class="edit-btn" onclick="cancelEditToday()">취소</button>` : ''}`;
            if(isEditingToday && myActive) setTimeout(() => { myActive.items.forEach((it, i) => { if(document.getElementById('g'+(i+1))) document.getElementById('g'+(i+1)).value = it.t; }); document.getElementById('g-wish').value = myActive.wish || ""; }, 0);
        } else {
            myS.innerHTML = `<div class="goal-card">${myActive.status === 'completed' ? '<div class="stamp">💮<span>최고야</span></div>' : ''}<h4>내 임무 (${myActive.date})</h4>${myActive.wish ? `<div class="wish-box">✨ 달성 후 소원：${myActive.wish}</div>` : ''}${myActive.items.map((it, i) => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} ${myActive.status!=='pending' ? 'disabled' : ''} onclick="toggleCheck(${i})"><span>${it.t}</span></div>`).join('')}<div style="margin-top:10px; display:flex; flex-direction:column; gap:5px;">${myActive.status === 'pending' ? '<button class="main-btn" onclick="requestReview()">완료! 도장 찍어주세요</button>' : (myActive.status === 'reviewing' ? '<p class="status-msg">⏳ 도장 기다리는 중...</p>' : '<p style="color:#4caf50; font-weight:bold;">🎉 임무 달성, 소원이 요술 램프 속으로 들어갔어요!</p>')}<button class="edit-btn" onclick="modifyTodayGoal()">임무 수정</button></div></div>`;
        }

        const pS = document.getElementById('partner-section');
        if (!pActive) { pS.innerHTML = `<p class="status-msg">🍵 ${partner}은(는) 아직 준비 중...</p>`; }
        else { 
            pS.innerHTML = `<div class="goal-card">${pActive.status === 'completed' ? '<div class="stamp">💮<span>최고야</span></div>' : ''}<h4>${partner}의 임무</h4>${pActive.wish ? `<div class="wish-box">🎁 자기의 소원：${pActive.wish}</div>` : ''}${pActive.items.map(it => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} disabled><span>${it.t}</span></div>`).join('')}${pActive.status === 'reviewing' ? `<button class="main-btn" style="background:#ff6b81" onclick="approvePartner()">💮 ${partner}에게 도장 찍어주기</button>` : ''}</div>`; 
        }

        const wData = Object.entries(globalData.wishes || {});
        const pWishes = wData.filter(([,v]) => v.owner === partner);
        const mWishes = wData.filter(([,v]) => v.owner === currentUser);

        let wishHtml = `<div style="display:flex; gap:10px; width:100%;">`;
        wishHtml += `<div style="flex:1; background:#fff9e6; border:1px dashed #ffe082; border-radius:15px; padding:15px;">`;
        wishHtml += `<h4 style="text-align:center; color:#b8860b; margin-top:0; font-size:0.95rem;">${partner}의 소원</h4>`;
        if(pWishes.length === 0) wishHtml += `<p style="font-size:0.8rem; color:#d4af37; text-align:center;">현재 소원이 없어요</p>`;
        pWishes.forEach(([k, v]) => {
            wishHtml += `<div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:10px; font-size:0.9rem;">
                <input type="checkbox" onclick="fulfillWish('${k}')" style="margin-top:2px;">
                <span style="color:#5d4037; line-height:1.3; word-break:break-word;">${v.text}</span>
            </div>`;
        });
        wishHtml += `</div>`;

        wishHtml += `<div style="flex:1; background:#fffafb; border:1px dashed var(--accent-pink); border-radius:15px; padding:15px;">`;
        wishHtml += `<h4 style="text-align:center; color:var(--deep-pink); margin-top:0; font-size:0.95rem;">내 소원</h4>`;
        if(mWishes.length === 0) wishHtml += `<p style="font-size:0.8rem; color:#e08e9b; text-align:center;">현재 소원이 없어요</p>`;
        mWishes.forEach(([k, v]) => {
            wishHtml += `<div style="display:flex; align-items:flex-start; gap:8px; margin-bottom:10px; font-size:0.9rem;">
                <span style="font-size:1.1rem; line-height:1;">🌟</span>
                <span style="color:#5d4037; line-height:1.3; word-break:break-word;">${v.text}</span>
            </div>`;
        });
        wishHtml += `</div></div>`;
        document.getElementById('wish-area').innerHTML = wishHtml;

        const tmArea = document.getElementById('tomorrow-area');
        if (!tmPlan || isEditingTomorrow) {
            tmArea.innerHTML = `<div class="tomorrow-board"><h4>${isEditingTomorrow ? '✍ 내일 계획 수정' : '내일 미리 계획하기'}</h4><input type="text" id="t1" placeholder="내일 계획 1"><input type="text" id="t2" placeholder="내일 계획 2"><input type="text" id="t3" placeholder="내일 계획 3"><input type="text" id="t-wish" class="wish-input" placeholder="🎁 내일의 작은 소원"><button class="main-btn" style="background:#a5d6a7" onclick="saveTomorrowPlan()">저장 ✨</button></div>`;
            if(isEditingTomorrow && tmPlan) setTimeout(() => { tmPlan.items.forEach((it, i) => { if(document.getElementById('t'+(i+1))) document.getElementById('t'+(i+1)).value = it.t; }); document.getElementById('t-wish').value = tmPlan.wish || ""; }, 0);
        } else { tmArea.innerHTML = `<div class="tomorrow-board" style="text-align:center;"><p style="color:#4caf50; font-weight:bold;">내일 계획 준비 완료 🚀</p><button class="edit-btn" style="border-color:#a5d6a7; color:#4caf50;" onclick="editTomorrow()">수정</button></div>`; }

        const msgList = document.getElementById('message-list');
        const msgs = Object.values(globalData.messages || {}).sort((a,b) => a.timestamp - b.timestamp);
        msgList.innerHTML = msgs.length > 0 ? msgs.map(m => `<div class="msg-bubble ${m.sender === currentUser ? 'msg-right' : 'msg-left'}">${m.text}</div>`).join('') : '<p style="text-align:center;color:#ccc;font-size:0.8rem;">아직 메시지가 없어요...</p>';
        msgList.scrollTop = msgList.scrollHeight;

        renderCalendar('stats', statsViewDate, 'stats-area');
        renderCalendar('video', videoViewDate, 'video-calendar-area');

        const histRaw = Object.entries(globalData.history || {}).sort(([,a], [,b]) => (b.timestamp||0) - (a.timestamp||0));
        const groupedDates = [];
        histRaw.forEach(([key, h]) => {
            const dKey = h.logicDate || h.date;
            let group = groupedDates.find(g => g.dateKey === dKey);
            if(!group) { group = { dateKey: dKey, items: [] }; groupedDates.push(group); }
            group.items.push({ key, ...h });
        });
        const displayGroups = window.showAllHistory ? groupedDates : groupedDates.slice(0, 7);
        
        document.getElementById('history-list').innerHTML = displayGroups.map((group, gIdx) => `
            <div class="history-day-group ${gIdx % 2 === 0 ? 'history-bg-white' : 'history-bg-pink'}">
                <div style="text-align:center; font-weight:bold; color:var(--deep-pink); padding:10px;">✨ ${group.items[0].date} ✨</div>
                ${group.items.map(h => {
                    const canRetroStamp = h.status !== 'completed' && h.logicDate && h.logicDate.startsWith(currentMonthStr) && h.owner === partner;
                    return `
                    <div class="history-item">
                        <button class="del-btn" onclick="deleteHistory('${h.key}')">🗑️</button>
                        <div class="history-stamp">${h.status === 'completed' ? '💮' : '<div style="width: 20px; height: 20px; border-radius: 50%; background: #e0e0e0; margin: 0 auto;"></div>'}</div>
                        <div class="history-content">
                            <b>${h.owner}</b>
                            ${canRetroStamp ? `<button style="margin-left:8px; padding:2px 8px; background:var(--primary-pink); color:white; border:none; border-radius:10px; font-size:0.75rem; cursor:pointer;" onclick="retroStamp('${h.key}')">${partner}에게 도장 찍어주기 💮</button>` : ''}
                            <br>${h.items.map(i => (i.d ? '✅' : '❌') + i.t).join(' | ')}
                        </div>
                    </div>`;
                }).join('')}
            </div>`).join('') + (groupedDates.length > 7 ? `<button class="edit-btn" style="width:100%;" onclick="toggleHistory()">${window.showAllHistory ? '접기' : '전체 보기'}</button>` : '');
    }

    function renderCalendar(type, viewDate, elementId) {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const monthKey = `${y}-${String(m + 1).padStart(2, '0')}`;
        
        let html = `<div class="cal-header"><button class="nav-btn" onclick="changeMonth('${type}', -1)"><</button><b>${y}년 ${m + 1}월</b><button class="nav-btn" onclick="changeMonth('${type}', 1)">></button></div>`;
        const logicTodayStr = getLogicDate(); 

        if (type === 'stats') {
            let myS = 0, pS = 0, myDates = new Set(), partner = userMap[currentUser].partner;
            Object.values(globalData.history).forEach(h => {
                if (h.status === 'completed' && h.logicDate?.startsWith(monthKey)) {
                    if (h.owner === currentUser) { myS++; myDates.add(h.logicDate); } else pS++;
                }
            });
            
            let leadText = '';
            if (myS > pS) leadText = '🥇 현재 내가 앞서고 있어! 헤헤~';
            else if (myS < pS) leadText = `🥇 ${partner} 자기가 앞서고 있어! 따라잡을 거야!`;
            else leadText = '🤝 예~ 현재 무승부! 우리 둘 다 최고야!';

            html += `
                <div style="text-align:center; margin-bottom:10px;">
                    <div style="color:var(--deep-pink); font-weight:bold; font-size:0.95rem;">${leadText}</div>
                    <div style="font-size:0.8rem; color:#888; margin-top:3px;">나 도장 ${myS}개 vs ${partner} 도장 ${pS}개</div>
                </div>
            `;
            
            html += `<div class="cal-grid">` + ['일','월','화','수','목','금','토'].map(d => `<b>${d}</b>`).join('');
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) html += `<div></div>`;
            for(let d=1; d<=days; d++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const has = myDates.has(dateStr);
                html += `<div class="cal-day ${has?'active':''}">
                            <span style="position:relative; z-index:2; ${has ? 'font-weight:bold; color:var(--deep-pink);' : ''}">${d}</span>
                            ${has ? '<div style="font-size:2rem; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); opacity:0.6; pointer-events:none; z-index:1;">💮</div>' : ''}
                         </div>`;
            }
            html += `</div>`;
        } else {
            html += `<div class="cal-grid">` + ['일','월','화','수','목','금','토'].map(d => `<b>${d}</b>`).join('');
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) html += `<div></div>`;
            for(let d=1; d<=days; d++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const vData = globalData.videos[dateStr] || {};
                
                let hasPanda = false, hasCat = false;
                if (typeof vData.panda === 'string') hasPanda = true;
                if (typeof vData.cat === 'string') hasCat = true;
                Object.entries(vData).forEach(([k, v]) => {
                    if (k !== 'panda' && k !== 'cat' && typeof v === 'object') {
                        if (v.owner === "Nini'bf") hasPanda = true;
                        if (v.owner === 'Nini') hasCat = true;
                    }
                });
                
                const isFuture = dateStr > logicTodayStr;
                const clickEvent = isFuture ? '' : `onclick="openVideoModal('${dateStr}', null)"`;
                const styleStr = isFuture ? 'opacity:0.4; cursor:not-allowed; background:transparent;' : '';

                html += `<div class="cal-day" style="${styleStr}" ${clickEvent}>
                    <span style="font-size:0.7rem; color:#ccc;">${d}</span>
                    <div style="display:flex; gap:2px; font-size:1.1rem; margin-top:2px;">
                        ${hasPanda ? `<span onclick="event.stopPropagation(); openVideoModal('${dateStr}', \`Nini'bf\`)" style="cursor:pointer;">🐼</span>` : ''}
                        ${hasCat ? `<span onclick="event.stopPropagation(); openVideoModal('${dateStr}', 'Nini')" style="cursor:pointer;">🐱</span>` : ''}
                    </div>
                </div>`;
            }
            html += `</div>`;
        }
        document.getElementById(elementId).innerHTML = html;
    }
</script>
</body>
</html>
